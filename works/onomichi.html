<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="robots" content="noindex" />
    <title>SnapOnomichiサイト紹介ページ</title>
    <meta
      name="description"
      content="デイトラWeb制作コース中級編の最終課題として制作した架空の尾道紹介サイトです。HTML/CSSを用いたレスポンシブ対応のデザインを実装しています。"
    />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c&family=Quicksand:wght@300..700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/style.css" />
  </head>

  <body>
    <main class="work">
      <div class="work__inner">
        <div class="work__left">
          <!-- タイトル -->
          <section class="work__header">
            <h1 class="work__title">
              <span class="work__title-main">Snap onomichi</span>
              <span class="work__title-sub">架空サイト</span>
            </h1>
          </section>

          <!-- メイン画像 -->
          <section class="work__visual">
            <div class="work__mock">
              <picture>
                <source
                  srcset="../img/project/onomichi-fullpage.webp"
                  type="image/webp"
                />
                <img
                  src="../img/project/onomichi-fullpage.jpg"
                  alt="コーポレートサイトPC表示"
                  width="1898"
                  height="1080"
                />
              </picture>
            </div>
          </section>
        </div>

        <div class="work__right">
          <!-- ボタン -->
          <section class="work__button">
            <a href="#" class="work__link" target="_blank">
              サイトを見る(公開準備中)
            </a>
          </section>

          <!-- 概要 -->
          <section class="work__section">
            <h2 class="work__heading">Overview</h2>
            <p class="work__text">
              デザインの意図を崩さないよう構造を整理しながら、HTML/CSSで忠実に再現しました。
            </p>
          </section>

          <!-- 工夫した点 -->
          <section class="work__section">
            <h2 class="work__heading">Point</h2>
            <ul class="work__list">
              <li>
                大きな背景画像が画面サイズに応じて自然に見えるよう、表示領域とバランスを調整しました。
              </li>
              <li>
                装飾画像の配置がレスポンシブでも崩れたり隠れたりしないよう、レイアウト全体の整合性を意識して実装しました。
              </li>
            </ul>
          </section>

          <!-- 使用技術 -->
          <section class="work__section">
            <h2 class="work__heading">Tech</h2>
            <p class="work__text">HTML / SCSS / JavaScript</p>
          </section>

          <!-- 制作範囲 -->
          <section class="work__section">
            <h2 class="work__heading">Role</h2>
            <p class="work__text">
              Design：デイトラ提供（課題カンプ）<br />
              Coding：全て実装
            </p>
          </section>

          <!-- 戻るボタン -->
          <section class="work__back">
            <a href="../index.html#works" class="work__back-link">
              ← Works一覧へ戻る
            </a>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
